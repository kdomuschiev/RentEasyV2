name: Deploy Web to Azure Web App

on:
  push:
    branches:
      - main
    paths:
      - 'renteasy-web/**'
      - '.github/workflows/web-deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: renteasy-web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: renteasy-web

      - name: Build
        run: npm run build
        working-directory: renteasy-web
        env:
          NODE_ENV: production

      - name: Copy static assets into standalone output
        run: |
          cp -r renteasy-web/.next/static renteasy-web/.next/standalone/.next/static
          cp -r renteasy-web/public renteasy-web/.next/standalone/public

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: renteasy-web/.next/standalone
