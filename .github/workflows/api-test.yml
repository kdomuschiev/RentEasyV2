name: Test API

on:
  push:
    branches:
      - main
    paths:
      - 'RentEasy.Api/**'
      - 'RentEasy.Api.Tests/**'
      - '.github/workflows/api-test.yml'
  pull_request:
    paths:
      - 'RentEasy.Api/**'
      - 'RentEasy.Api.Tests/**'
      - '.github/workflows/api-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore RentEasy.Api.Tests/RentEasy.Api.Tests.csproj

      - name: Build
        run: dotnet build RentEasy.Api.Tests/RentEasy.Api.Tests.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test RentEasy.Api.Tests/RentEasy.Api.Tests.csproj --configuration Release --no-build --verbosity normal
